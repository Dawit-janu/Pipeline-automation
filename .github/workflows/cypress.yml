name: Cypress Automation Test

on:
  # ЁЯЪА Push ke main тЖТ trigger (merge dari QA branch setelah fix)
  push:
    branches: [ main ]

  # ЁЯФА Pull Request ke main тЖТ trigger saat QA buat PR dari branch fix
  pull_request:
    branches: [ main ]  

  # ЁЯЦР Manual trigger
  workflow_dispatch:

  # тЬЕ STEP 2 тАФ SCHEDULER (DITAMBAHKAN DI SINI)
  schedule:
   #- cron: '0 1 * * *'   # 08:00 WIB (UTC+7)
   #- cron: '40 20 * * *'
      - cron: '0 23 * * 0-5'
      - cron: '0 5 * * 1-6'
      #- cron: '*/5 * * * *'


jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect trigger & start time
        run: |
          echo "TRIGGER=${{ github.event_name }}" >> $GITHUB_ENV
          echo "JOB_START_TIME=$(date +%s)"       >> $GITHUB_ENV

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install project dependencies
        run: npm ci

      # ============================================================
      # RUN CYPRESS
      # ============================================================
      - name: Run Cypress Tests
        continue-on-error: true
        run: |
          npx cypress run \
            --record \
            --key ${{ secrets.CYPRESS_RECORD_KEY }} \
            2>&1 | tee cypress-raw.txt

      - name: Strip ANSI color codes
        if: always()
        run: sed 's/\x1B\[[0-9;]*[mKHF]//g' cypress-raw.txt > cypress-output.txt

      # ============================================================
      # ALLURE
      # ============================================================
      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline --quiet
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-report
          fi

      # 1. Upload folder Report utk Job selanjutnya
      - name: Upload Allure Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
      # 2. Upload text output utk Job selanjutnya (untuk parse statistik)
      - name: Upload Output Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-output
          path: cypress-output.txt
          retention-days: 1

      # Tambahkan step ini setelah 'Checkout repo'
      - name: Download Duration Artifact
        uses: actions/download-artifact@v4
        with:
          name: duration-artifact
          path: ./
      # ============================================================
      # JOB 2: DEPLOY & DISCORD
    # ============================================================
  deploy-and-notify:
    needs: cypress-run
    # Jalankan walaupun test sebelumnya fail/gagal
    if: always() 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (Required for deploy)
        uses: actions/checkout@v4

      # Download report dari Job 1
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: ./allure-report

      # Download text output dari Job 1
      - name: Download Output Text
        uses: actions/download-artifact@v4
        with:
          name: cypress-output
          path: ./
      # ============================================================
      # DEPLOY KE GITHUB PAGES
      # ============================================================
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true # Agar history git tetap bersih

      # ============================================================
      # EXTRACT STATS
      # ============================================================
      - name: Extract test summary
        if: always()  
        run: |
          # Parsing logic sama persis dengan yang Anda punya
          SUMMARY_LINE=$(grep -E '(All specs passed|of [0-9]+ failed)' cypress-output.txt | tail -1)
          if [ -n "$SUMMARY_LINE" ]; then
            CLEAN=$(echo "$SUMMARY_LINE" | sed 's/[^0-9 \t-]//g' | tr -s ' \t' ' ' | sed 's/^ //')
            FIELD_COUNT=$(echo "$CLEAN" | awk '{print NF}')
            TOTAL=$(echo "$CLEAN"   | awk -v n=$FIELD_COUNT '{print $(n-4)}' | sed 's/-/0/')
            PASSING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-3)}' | sed 's/-/0/')
            FAILING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-2)}' | sed 's/-/0/')
            PENDING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-1)}' | sed 's/-/0/')
          fi
          
          TOTAL=${TOTAL:-0}
          PASSING=${PASSING:-0}
          FAILING=${FAILING:-0}
          PENDING=${PENDING:-0}

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSING * 100 / $TOTAL" | bc)
          else
            PASS_RATE="0"
          fi

          # Parsing TS Name
          TS_NAME=$(grep -E "тФВ\s+[тЬФтЬЦ]" cypress-output.txt | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_/-]+\.cy\.js" | sed 's|/[^/]*$||' | sort -u | sed 's/^/тАв /')
          TS_NAME=${TS_NAME:-"тАв e2e"}

          # Simpan ke ENV untuk step Discord
          echo "TOTAL_TESTS=$TOTAL" >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSING" >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILING" >> $GITHUB_ENV
          echo "PENDING_TESTS=$PENDING" >> $GITHUB_ENV
          echo "PASS_RATE=${PASS_RATE}%" >> $GITHUB_ENV
          echo "TS_NAME<<EOF" >> $GITHUB_ENV
          echo "$TS_NAME" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Extract failed test details
        if: always()
        run: |
          # Logic parsing failed test sama dengan script Anda
          FAILED_SPECS=$(grep -E "тФВ\s+тЬЦ" cypress-output.txt | grep -oE "[A-Za-z0-9_/-]+\.cy\.js" | sed "s/\.cy\.js$//" | sort -u)
          FAILED_TESTS_PARSED=$(awk '
            /^[[:space:]]+[0-9]+\)/ { in_block=1; describe_line=""; test_line=""; next }
            in_block==1 && /^[[:space:]]+[A-Za-z]/ && describe_line=="" {
              line=$0; gsub(/^[[:space:]]+/, "", line); describe_line=line; next
            }
            in_block==1 && /^[[:space:]]+[A-Za-z]/ && describe_line!="" && test_line=="" {
              line=$0; gsub(/^[[:space:]]+/, "", line); gsub(/:$/, "", line)
              test_line=line; print describe_line "|" test_line; in_block=0
            }
            /^[[:space:]]*$/ && in_block==1 { in_block=0 }
          ' cypress-output.txt)

          echo "FAILED_SPECS<<EOF" >> $GITHUB_ENV
          echo "$FAILED_SPECS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "FAILED_TESTS_PARSED<<EOF" >> $GITHUB_ENV
          echo "$FAILED_TESTS_PARSED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # ==========================================
          # TAMBAHKAN INI DI AKHIR (sebelum echo selesai)
          # ==========================================
          if [ -f duration.txt ]; then
            TEST_DURATION=$(cat duration.txt)
          else
            TEST_DURATION="N/A"
          fi
          echo "TEST_DURATION=$TEST_DURATION" >> $GITHUB_ENV
          # ==========================================

      # ============================================================
      # DISCORD NOTIFICATION
      # ============================================================
      - name: Send Discord Notification
        if: always()
        run: |
          DATE_RUN=$(TZ='Asia/Jakarta' date "+%Y-%m-%d %H:%M:%S WIB")

          TOTAL=${TOTAL_TESTS:-0}
          PASSED=${PASSED_TESTS:-0}
          FAILED=${FAILED_TESTS:-0}
          PENDING=${PENDING_TESTS:-0}

          # Tentukan Status
          if [ "$FAILED" != "0" ]; then
            STATUS_TEXT="has failed"
            RESULT_ICON="тЭМ"
            COLOR=15158332
          else
            STATUS_TEXT="has passed"
            RESULT_ICON="тЬЕ"
            COLOR=3066993
          fi

          # Tentukan Trigger Info
          case "${{ github.event_name }}" in
            schedule)          TRIGGER_LABEL="Scheduled"    ;;
            push)              TRIGGER_LABEL="Push to main" ;;
            pull_request)      TRIGGER_LABEL="Pull Request" ;;
            workflow_dispatch) TRIGGER_LABEL="Manual"       ;;
            *)                 TRIGGER_LABEL="${{ github.event_name }}"     ;;
          esac

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_INFO="PR #${{ github.event.pull_request.number }} (${{ github.head_ref }})"
          else
            BRANCH_INFO="${{ github.ref_name }}"
          fi

          # ========================================
          # PERUBAHAN UTAMA DI SINI: LINK GITHUB PAGES
          # ========================================
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO##*/}"
          # URL Report Allure di GitHub Pages
          ALLURE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          if [ "$FAILED" != "0" ] && [ -n "$FAILED_SPECS" ]; then
            SUITE_DISPLAY=$(echo "$FAILED_SPECS" | sed 's|/[^/]*$||' | sort -u | sed 's/^/тАв /')
          else
            SUITE_DISPLAY="$TS_NAME"
          fi

          FAILED_SECTION=""
          if [ "$FAILED" != "0" ]; then
            FAILED_SECTION="**${FAILED} test results failed**"
            # Kita link langsung ke Allure URL, karena deep link ke test di Allure statis agak rumit
            if [ -n "$FAILED_SPECS" ]; then
              while IFS= read -r spec_name; do
                [ -z "$spec_name" ] && continue
                FAILED_SECTION="${FAILED_SECTION}
          тАв ${spec_name}"
                        done <<< "$FAILED_SPECS"
                      fi
                    fi

          TITLE="Automation Report Allure"
          # Deskripsi mengarah ke ALLURE_URL
          DESC="Test Run [#${{ github.run_number }}](${ALLURE_URL}) of the **${REPO_NAME}** ${STATUS_TEXT}."

          BODY="${DESC}

          **Test Suite**
          ${SUITE_DISPLAY}

          **Execution**
          ЁЯЧУ  ${DATE_RUN}
          тП▒  ${TEST_DURATION:-"N/A"}

          **Results**
          Total Runs    : ${TOTAL}
          тЬЕ  Passed    : ${PASSED}
          тЭМ  Failed    : ${FAILED}"

          if [ -n "$FAILED_SECTION" ]; then
            BODY="${BODY}

          тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
          ${FAILED_SECTION}"
                    fi

                    FOOTER="${REPO} | ${BRANCH_INFO} | ${TRIGGER_LABEL}"

                    jq -n             --arg title  "$TITLE"             --arg body   "$BODY"             --arg footer "$FOOTER"             --arg url    "$ALLURE_URL"             --argjson color $COLOR           '{
                      embeds: [{
                                title: $title,
                                url: $url,
                                description: $body,
                                color: $color,
                                footer: { text: $footer },
                                timestamp: (now | todateiso8601)
                              }]
                              }'| curl -s -H "Content-Type: application/json"               -X POST               -d @-               ${{ secrets.DISCORD_WEBHOOK }}

      # ============================================================
      # CALCULATE DURATION (JOB 1)
      # ============================================================
      - name: Calculate Test Duration
        if: always()
        run: |
          JOB_END_TIME=$(date +%s)
          # Ambil start time dari env (jika 0 berarti error), hitung selisih
          START=${JOB_START_TIME:-0}
          DURATION_SEC=$(( JOB_END_TIME - START ))
          MINUTES=$((DURATION_SEC / 60))
          SECONDS=$((DURATION_SEC % 60))
          # Simpan hasil ke file duration.txt
          echo "${MINUTES}m ${SECONDS}s" > duration.txt

      - name: Upload Duration Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duration-artifact
          path: duration.txt
          retention-days: 1