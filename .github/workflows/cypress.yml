name: Cypress Automation Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]  
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * 0-5'
    - cron: '0 5 * * 1-6'

permissions:
  contents: write

jobs:
  # ==========================================
  # STAGE 1: TEST
  # ==========================================
  cypress-test:
    name: Run Cypress Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Record Start Time
        run: date +%s > start_time.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Install project dependencies
        run: npm ci

      # RUN CYPRESS
      - name: Run Cypress Tests
        run: |
          npx cypress run \
            --record \
            --key ${{ secrets.CYPRESS_RECORD_KEY }} \
            2>&1 | tee cypress-raw.txt

      - name: Strip ANSI color codes
        if: always()
        run: sed 's/\x1B\[[0-9;]*[mKHF]//g' cypress-raw.txt > cypress-output.txt

      # Upload artifact untuk Job GSheet dan Report
      - name: Upload Raw Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-output
          path: cypress-output.txt
          retention-days: 1
          
      - name: Calculate Duration
        if: always()
        run: |
          START=$(cat start_time.txt)
          END=$(date +%s)
          DURATION=$((END - START))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "${MINUTES}m ${SECONDS}s" > duration.txt

      - name: Upload Duration
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duration-artifact
          path: duration.txt
          retention-days: 1

  # ==========================================
  # STAGE 2: REPORT
  # ==========================================
  report:
    name: Deploy Report
    runs-on: ubuntu-latest
    needs: cypress-test
    if: always() 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Output Text
        uses: actions/download-artifact@v4
        with:
          name: cypress-output
          path: ./

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline --quiet
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-report
          else
            mkdir -p allure-report
            echo "<h1>No Test Results Found</h1>" > allure-report/index.html
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true

  # ==========================================
  # STAGE 3: DATA (UPDATE GSHEET)
  # ==========================================
  # UPDATE LOGIC: Jalan SELALU (Pass atau Fail)
  update-gsheet:
    name: Update Google Sheet
    runs-on: ubuntu-latest
    container: node:18-alpine
    needs: cypress-test
    if: always() # <--- KEY CHANGE: Jalan meskipun test gagal

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Download output agar script bisa baca hasil Pass/Fail
      - name: Download Output Text
        uses: actions/download-artifact@v4
        with:
          name: cypress-output
          path: ./

      - name: Install Dependencies
        run: npm ci --omit=dev

      - name: Write Credentials
        run: echo "$GOOGLE_CREDENTIALS" > google-credentials.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Update Sheet
        run: node scripts/sheets-updater-ci.js

  # ==========================================
  # STAGE 4: NOTIFY (FAIL)
  # ==========================================
  notify-fail:
    name: Notify Discord (Fail)
    runs-on: ubuntu-latest
    needs: update-gsheet # <--- KEY CHANGE: Menunggu GSheet update dulu
    # Hanya jalan jika job 'cypress-test' gagal
    if: needs.cypress-test.result == 'failure' 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Utils
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Download Output
        uses: actions/download-artifact@v4
        with:
          name: cypress-output
          path: ./

      - name: Download Duration
        uses: actions/download-artifact@v4
        with:
          name: duration-artifact
          path: ./

      - name: Extract Stats & Send Fail Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # --- PARSING LOGIC ---
          SUMMARY_LINE=$(grep -E '(All specs passed|of [0-9]+ failed)' cypress-output.txt | tail -1)
          if [ -n "$SUMMARY_LINE" ]; then
            CLEAN=$(echo "$SUMMARY_LINE" | sed 's/[^0-9 \t-]//g' | tr -s ' \t' ' ' | sed 's/^ //')
            FIELD_COUNT=$(echo "$CLEAN" | awk '{print NF}')
            TOTAL=$(echo "$CLEAN"   | awk -v n=$FIELD_COUNT '{print $(n-4)}' | sed 's/-/0/')
            PASSING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-3)}' | sed 's/-/0/')
            FAILING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-2)}' | sed 's/-/0/')
            PENDING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-1)}' | sed 's/-/0/')
          fi
          
          TOTAL=${TOTAL:-0}
          PASSING=${PASSING:-0}
          FAILING=${FAILING:-0}
          PENDING=${PENDING:-0}

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSING * 100 / $TOTAL" | bc)
          else
            PASS_RATE="0"
          fi

          TS_NAME=$(grep -E "‚îÇ\s+[‚úî‚úñ]" cypress-output.txt | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_/-]+\.cy\.js" | sed 's|/[^/]*$||' | sort -u | sed 's/^/‚Ä¢ /')
          TS_NAME=${TS_NAME:-"‚Ä¢ e2e"}

          if [ -f duration.txt ]; then TEST_DURATION=$(cat duration.txt); else TEST_DURATION="N/A"; fi

          FAILED_SECTION=""
          if [ "$FAILING" != "0" ]; then
            FAILED_SPECS=$(grep -E "‚îÇ\s+‚úñ" cypress-output.txt | grep -oE "[A-Za-z0-9_/-]+\.cy\.js" | sed "s/\.cy\.js$//" | sort -u)
            FAILED_SECTION="**${FAILING} test results failed**"
            if [ -n "$FAILED_SPECS" ]; then
                while IFS= read -r spec_name; do
                  [ -z "$spec_name" ] && continue
                  FAILED_SECTION="${FAILED_SECTION}
            ‚Ä¢ ${spec_name}"
                done <<< "$FAILED_SPECS"
            fi
          fi
          # --- PARSING END ---

          # --- DISCORD ---
          DATE_RUN=$(TZ='Asia/Jakarta' date "+%Y-%m-%d %H:%M:%S WIB")
          TRIGGER_LABEL="${{ github.event_name }}"
          BRANCH_INFO="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO##*/}"
          ALLURE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          COLOR=15158332 
          TITLE="Automation Report ‚ùå"
          DESC="Test Run [#${{ github.run_number }}](${ALLURE_URL}) of the **${REPO_NAME}** has failed."

          BODY="${DESC}

          **Test Suite**
          ${TS_NAME}

          **Execution**
          üóì  ${DATE_RUN}
          ‚è±  ${TEST_DURATION}

          **Results**
          Total Runs    : ${TOTAL}
          ‚úÖ  Passed    : ${PASSING}
          ‚ùå  Failed    : ${FAILING}"

          if [ -n "$FAILED_SECTION" ]; then
            BODY="${BODY}

          ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
          ${FAILED_SECTION}"
          fi
          
          FOOTER="${REPO} | ${BRANCH_INFO} | ${TRIGGER_LABEL}"

          jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg footer "$FOOTER" \
            --arg url "$ALLURE_URL" \
            --argjson color $COLOR \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $body,
                color: $color,
                footer: { text: $footer },
                timestamp: (now | todateiso8601)
              }]
            }' | curl -s -H "Content-Type: application/json" -X POST -d @- $DISCORD_WEBHOOK

  # ==========================================
  # STAGE 4: NOTIFY (PASS)
  # ==========================================
  notify-pass:
    name: Notify Discord (Pass)
    runs-on: ubuntu-latest
    needs: update-gsheet # <--- KEY CHANGE: Menunggu GSheet update dulu
    # Hanya jalan jika job 'cypress-test' sukses
    if: needs.cypress-test.result == 'success'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Utils
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Download Output
        uses: actions/download-artifact@v4
        with:
          name: cypress-output
          path: ./

      - name: Download Duration
        uses: actions/download-artifact@v4
        with:
          name: duration-artifact
          path: ./

      - name: Extract Stats & Send Success Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # --- PARSING ---
          SUMMARY_LINE=$(grep -E '(All specs passed|of [0-9]+ failed)' cypress-output.txt | tail -1)
          if [ -n "$SUMMARY_LINE" ]; then
            CLEAN=$(echo "$SUMMARY_LINE" | sed 's/[^0-9 \t-]//g' | tr -s ' \t' ' ' | sed 's/^ //')
            FIELD_COUNT=$(echo "$CLEAN" | awk '{print NF}')
            TOTAL=$(echo "$CLEAN"   | awk -v n=$FIELD_COUNT '{print $(n-4)}' | sed 's/-/0/')
            PASSING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-3)}' | sed 's/-/0/')
            FAILING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-2)}' | sed 's/-/0/')
            PENDING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-1)}' | sed 's/-/0/')
          fi
          
          TOTAL=${TOTAL:-0}
          PASSING=${PASSING:-0}
          FAILING=${FAILING:-0}
          PENDING=${PENDING:-0}
          
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSING * 100 / $TOTAL" | bc)
          else
            PASS_RATE="0"
          fi

          TS_NAME=$(grep -E "‚îÇ\s+[‚úî‚úñ]" cypress-output.txt | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_/-]+\.cy\.js" | sed 's|/[^/]*$||' | sort -u | sed 's/^/‚Ä¢ /')
          TS_NAME=${TS_NAME:-"‚Ä¢ e2e"}

          if [ -f duration.txt ]; then TEST_DURATION=$(cat duration.txt); else TEST_DURATION="N/A"; fi

          # --- DISCORD ---
          DATE_RUN=$(TZ='Asia/Jakarta' date "+%Y-%m-%d %H:%M:%S WIB")
          TRIGGER_LABEL="${{ github.event_name }}"
          BRANCH_INFO="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO##*/}"
          ALLURE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          COLOR=3066993 
          TITLE="Automation Report ‚úÖ"
          DESC="Test Run [#${{ github.run_number }}](${ALLURE_URL}) of the **${REPO_NAME}** has passed."

          BODY="${DESC}

          **Test Suite**
          ${TS_NAME}

          **Execution**
          üóì  ${DATE_RUN}
          ‚è±  ${TEST_DURATION}

          **Results**
          Total Runs    : ${TOTAL}
          ‚úÖ  Passed    : ${PASSING}
          ‚ùå  Failed    : ${FAILING}"

          FOOTER="${REPO} | ${BRANCH_INFO} | ${TRIGGER_LABEL}"

          jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg footer "$FOOTER" \
            --arg url "$ALLURE_URL" \
            --argjson color $COLOR \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $body,
                color: $color,
                footer: { text: $footer },
                timestamp: (now | todateiso8601)
              }]
            }' | curl -s -H "Content-Type: application/json" -X POST -d @- $DISCORD_WEBHOOK